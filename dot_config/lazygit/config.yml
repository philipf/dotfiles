---
# Catppuccin Mocha (blue accent) — https://github.com/catppuccin/lazygit
gui:
  nerdFontsVersion: '3'
  theme:
    activeBorderColor: ['#89b4fa', bold]
    inactiveBorderColor: ['#a6adc8']
    optionsTextColor: ['#89b4fa']
    selectedLineBgColor: ['#313244']
    cherryPickedCommitBgColor: ['#45475a']
    cherryPickedCommitFgColor: ['#89b4fa']
    unstagedChangesColor: ['#f38ba8']
    defaultFgColor: ['#cdd6f4']
    searchingActiveBorderColor: ['#f9e2af', bold]
  authorColors:
    '*': '#b4befe'
customCommands:
  - key: <c-g>
    context: localBranches
    command: git log --oneline --no-merges {{.CheckedOutBranch.Name}}..{{.SelectedLocalBranch.Name}}
    description: 'PR-style commit delta: selected branch vs current'
    output: popup
  - key: <c-b>
    context: localBranches
    command: git merge-base {{.CheckedOutBranch.Name}} {{.SelectedLocalBranch.Name}}
    description: merge-base of current and selected branch
    output: popup
  - key: <c-t>
    context: files
    description: Open selected file in nvim Diffview
    output: terminal
    command: cd "$(git rev-parse --show-toplevel)" && nvim "{{.SelectedFile.Name}}" -c "DiffviewOpen -- {{.SelectedFile.Name}}"
git:
  pagers:
    - colorArg: always
      pager: delta --paging=never
promptToReturnFromSubprocess: false
os:
  editInTerminal: true
