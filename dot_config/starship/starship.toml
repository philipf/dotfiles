# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Extend the default format config: https://starship.rs/config/#default-prompt-format
#format="""
#...
#${custom.jj}\
#...
#"""

# Inserts a blank line between shell prompts
add_newline = false

[directory]
# Show the real filesystem path (not collapsed to the repo/worktree root) so that
# same-named worktrees like .../gotta-go/main vs .../big-swim-nz/main are distinct.
# Keep only the last 7 path components; deeper paths get the "…/" prefix.
truncate_to_repo = false
truncation_length = 7
truncation_symbol = "…/"

[python]
symbol = " "


[custom.jj]
command = "prompt"
format = "$output"
ignore_timeout = true
shell = ["starship-jj", "--ignore-working-copy", "starship"]
use_stdin = false
when = true

[git_status]
disabled = true

[custom.git_status]
when = "! jj --ignore-working-copy root"
command = "starship module git_status"
style = "" # This disables the default "(bold green)" style
description = "Only show git_status if we're not in a jj repo"

[git_commit]
disabled = true

[custom.git_commit]
when = "! jj --ignore-working-copy root"
command = "starship module git_commit"
style = ""
description = "Only show git_commit if we're not in a jj repo"

[git_metrics]
disabled = true

[custom.git_metrics]
when = "! jj --ignore-working-copy root"
command = "starship module git_metrics"
description = "Only show git_metrics if we're not in a jj repo"
style = ""

[custom.worktree]
# A yellow ⑂ marks that we're inside a *linked* git worktree, where starship's
# directory module truncates to the worktree root so the path alone is ambiguous.
# Linked worktree => resolved git-dir (.git/worktrees/<name>) differs from the
# resolved common dir (.git). Guarded to stay silent outside a git repo and in a
# primary checkout; pwd -P keeps it correct under symlinked paths.
when = 'git rev-parse --is-inside-work-tree >/dev/null 2>&1 && gd=$(cd "$(git rev-parse --git-dir 2>/dev/null)" 2>/dev/null && pwd -P) && cdr=$(cd "$(git rev-parse --git-common-dir 2>/dev/null)" 2>/dev/null && pwd -P) && [ "$gd" != "$cdr" ]'
format = "[⑂]($style) "
style = "bold yellow"
description = "Mark when inside a linked git worktree"

[git_branch]
disabled = true

[custom.git_branch]
when = "! jj --ignore-working-copy root"
command = "starship module git_branch"
description = "Only show git_branch if we're not in a jj repo"
style = ""
