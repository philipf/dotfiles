# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Extend the default format config: https://starship.rs/config/#default-prompt-format
#format="""
#...
#${custom.jj}\
#...
#"""

# Inserts a blank line between shell prompts
add_newline = false

[python]
symbol = " "


[custom.jj]
command = "prompt"
format = "$output"
ignore_timeout = true
shell = ["starship-jj", "--ignore-working-copy", "starship"]
use_stdin = false
when = true

[git_status]
disabled = true

[custom.git_status]
when = "! jj --ignore-working-copy root"
command = "starship module git_status"
style = "" # This disables the default "(bold green)" style
description = "Only show git_status if we're not in a jj repo"

[git_commit]
disabled = true

[custom.git_commit]
when = "! jj --ignore-working-copy root"
command = "starship module git_commit"
style = ""
description = "Only show git_commit if we're not in a jj repo"

[git_metrics]
disabled = true

[custom.git_metrics]
when = "! jj --ignore-working-copy root"
command = "starship module git_metrics"
description = "Only show git_metrics if we're not in a jj repo"
style = ""

[custom.worktree]
# Disambiguate git worktrees: directory truncates to the worktree root (e.g. just
# "main"), so show "<project>/<worktree>" whenever we're in a *linked* worktree.
# Linked worktree => git-dir (.git/worktrees/<name>) differs from the common dir (.git).
when = '[ "$(git rev-parse --git-dir 2>/dev/null)" != "$(git rev-parse --git-common-dir 2>/dev/null)" ]'
command = 'printf "%s/%s" "$(basename "$(dirname "$(cd "$(git rev-parse --git-common-dir)" && pwd -P)")")" "$(basename "$(git rev-parse --show-toplevel)")"'
format = "[⑂ $output]($style) "
style = "bold yellow"
description = "Show project/worktree name when inside a linked git worktree"

[git_branch]
disabled = true

[custom.git_branch]
when = "! jj --ignore-working-copy root"
command = "starship module git_branch"
description = "Only show git_branch if we're not in a jj repo"
style = ""
